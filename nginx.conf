server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = /webmail-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /health {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $api_upstream http://mailcow-rest-api:3001;
        proxy_pass $api_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /openapi.json {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $api_upstream http://mailcow-rest-api:3001;
        proxy_pass $api_upstream/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location ^~ /v1/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $api_upstream http://mailcow-rest-api:3001;
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        client_max_body_size 100m;
    }

    location = /webmail {
        return 308 /webmail/;
    }

    location /webmail/mobile/ {
        try_files $uri $uri/ /webmail/mobile/index.html;
    }

    location /webmail/ {
        try_files $uri $uri/ /webmail/index.html;
    }
}
