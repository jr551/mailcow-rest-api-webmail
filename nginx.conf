server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /webmail {
        return 308 /webmail/;
    }

    location /webmail/mobile/ {
        try_files $uri $uri/ /webmail/mobile/index.html;
    }

    location /webmail/ {
        try_files $uri $uri/ /webmail/index.html;
    }
}
