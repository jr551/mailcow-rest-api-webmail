server {
    listen 443 ssl http2;
    server_name webmail.example.com;

    root /var/www/mailcow-rest-api-webmail;

    ssl_certificate /etc/letsencrypt/live/webmail.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webmail.example.com/privkey.pem;

    location = /health {
        proxy_pass https://mail.example.com/mailcow-rest-api/health;
        proxy_set_header Host mail.example.com;
    }

    location = /openapi.json {
        proxy_pass https://mail.example.com/mailcow-rest-api/openapi.json;
        proxy_set_header Host mail.example.com;
    }

    location ^~ /v1/ {
        proxy_pass https://mail.example.com/mailcow-rest-api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host mail.example.com;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        client_max_body_size 100m;
    }

    location = /webmail {
        return 308 /webmail/;
    }

    location /webmail/mobile/ {
        try_files $uri $uri/ /webmail/mobile/index.html;
    }

    location /webmail/ {
        try_files $uri $uri/ /webmail/index.html;
    }
}
